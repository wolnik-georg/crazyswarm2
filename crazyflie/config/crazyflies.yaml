# global settings for all robots
all:
  # firmware logging for all drones (use robot_types/type_name to set per type, or
  # robots/drone_name to set per drone)
  firmware_logging:
    enabled: true
    default_topics:
     # remove to disable default topic
      pose:
        frequency: 10 # Hz
      status:
        frequency: 1 # Hz
    custom_topics:
      # /cf231/state — pos + vel (6 floats = 24 bytes, fits in one CRTP log packet)
      state:
        frequency: 20 # Hz
        vars: ["stateEstimate.x", "stateEstimate.y", "stateEstimate.z",
               "stateEstimate.vx", "stateEstimate.vy", "stateEstimate.vz"]
      # /cf231/attitude — attitude + thrust + battery (5 floats = 20 bytes)
      attitude:
        frequency: 20 # Hz
        vars: ["stabilizer.roll", "stabilizer.pitch", "stabilizer.yaw",
               "stabilizer.thrust", "pm.vbat"]
      # /cf231/gyro_acc — gyro and accelerometer (6 floats = 24 bytes)
      gyro_acc:
        frequency: 20 # Hz
        vars: ["gyro.x", "gyro.y", "gyro.z", "acc.x", "acc.y", "acc.z"]
      # /cf231/indi_state — INDI torque base + alpha_meas (6 floats = 24 bytes)
      # Only meaningful when CONTROLLER_MODE = 1 in firmware_app/src/lib.rs.
      # tau_{x,y,z}: τ_prev [Nm].  alp_{x,y,z}: α_meas [rad/s²].
      indi_state:
        frequency: 20 # Hz
        vars: ["indi.tau_x", "indi.tau_y", "indi.tau_z",
               "indi.alp_x", "indi.alp_y", "indi.alp_z"]
      # /cf231/rpm — per-motor RPM from RPM deck (4 uint16 = 8 bytes)
      # Requires RPM deck fitted. Used to verify deck is reading and for
      # post-flight KT_MOTOR validation (thrust vs RPM²).
      rpm:
        frequency: 20 # Hz
        vars: ["rpm.m1", "rpm.m2", "rpm.m3", "rpm.m4"]
  # firmware parameters for all drones (use robot_types/type_name to set per type, or
  # robots/drone_name to set per drone)
  firmware_params:
    commander:
      enHighLevel: 1
    stabilizer:
      estimator: 2 # 1: complementary, 2: kalman
      controller: 6 # 1: PID, 2: mellinger, 6: geometric SE(3)
    # ring:
    #   effect: 16 # 6: double spinner, 7: solid color, 16: packetRate
    #   solidBlue: 255 # if set to solid color
    #   solidGreen: 0 # if set to solid color
    #   solidRed: 0 # if set to solid color
    #   headlightEnable: 0
    deck:
      bcRpm: 1  # RPM deck has no 1-Wire ID — must be force-enabled
    locSrv:
      extPosStdDev: 1e-3
      extQuatStdDev: 0.5e-1
    # kalman:
    #   resetEstimation: 1
  # reference frame for on-board state-estimate of all drones (use robot_types/type_name to set per type, or
  # robots/drone_name to set per drone)
  reference_frame: "world"
  broadcasts:
    num_repeats: 15 # number of times broadcast commands are repeated
    delay_between_repeats_ms: 1 # delay in milliseconds between individual repeats
