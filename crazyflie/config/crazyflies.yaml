# global settings for all robots
all:
  # firmware logging for all drones (use robot_types/type_name to set per type, or
  # robots/drone_name to set per drone)
  firmware_logging:
    enabled: true
    default_topics:
     # remove to disable default topic
      pose:
        frequency: 10 # Hz
      status:
        frequency: 1 # Hz
    custom_topics:
      # /cf231/state — pos + vel (6 floats = 24 bytes, fits in one CRTP log packet)
      state:
        frequency: 100 # Hz
        vars: ["stateEstimate.x", "stateEstimate.y", "stateEstimate.z",
               "stateEstimate.vx", "stateEstimate.vy", "stateEstimate.vz"]
      # /cf231/attitude — attitude + thrust + battery (5 floats = 20 bytes)
      attitude:
        frequency: 20 # Hz
        vars: ["stabilizer.roll", "stabilizer.pitch", "stabilizer.yaw",
               "stabilizer.thrust", "pm.vbat"]
      # /cf231/gyro_acc — gyro and accelerometer (6 floats = 24 bytes)
      gyro_acc:
        frequency: 20 # Hz
        vars: ["gyro.x", "gyro.y", "gyro.z", "acc.x", "acc.y", "acc.z"]
      # /cf231/indi_state — INDI torques + filtered alpha (6 floats = 24 bytes)
      # tau_{x,y,z}: torque command [Nm] — non-zero only in mode>=2.
      # alp_{x,y,z}: BW-filtered angular acceleration [rad/s²] — logged in ALL modes.
      indi_state:
        frequency: 100 # Hz
        vars: ["indi.tau_x", "indi.tau_y", "indi.tau_z",
               "indi.alp_x", "indi.alp_y", "indi.alp_z"]
      # /cf231/indi_alp_raw — pre-filter angular accel (3 floats = 12 bytes, separate packet)
      indi_alp_raw:
        frequency: 100 # Hz
        vars: ["indi.alp_raw_x", "indi.alp_raw_y", "indi.alp_raw_z"]
      # /cf231/indi_filter_char — FILTER CHARACTERISATION ONLY (swap with indi_state above)
      # Uncomment this block + comment out indi_state when running plot_indi_filters.py.
      # Logs raw alpha (pre-BW) + filtered alpha at 100 Hz for offline fc_bw sweep.
      # Works in mode=0 geometric hover — no INDI needed, filter runs passively.
      # After characterisation: re-comment this, uncomment indi_state above.
      # fc_bw=70 Hz confirmed 2026-07-03: dominant signal at 3.7-4.2 Hz, 0 dB noise reduction
      # in 100 Hz logs (motor noise at 350-700 Hz, above Nyquist — filter works in firmware).
      # No change needed vs standard drone.
      # indi_filter_char:
      #   frequency: 100 # Hz  (Nyquist 50 Hz — covers fc_bw tuning range 10-80 Hz)
      #   vars: ["indi.alp_raw_x", "indi.alp_raw_y", "indi.alp_raw_z",
      #          "indi.alp_x",     "indi.alp_y",     "indi.alp_z"]
      # /cf231/rpm — per-motor RPM from RPM deck (4 uint16 = 8 bytes)
      # Requires RPM deck fitted. Used to verify deck is reading and for
      # post-flight KT_MOTOR validation (thrust vs RPM²).
      rpm:
        frequency: 20 # Hz
        vars: ["rpm.m1", "rpm.m2", "rpm.m3", "rpm.m4"]
  # firmware parameters for all drones (use robot_types/type_name to set per type, or
  # robots/drone_name to set per drone)
  firmware_params:
    commander:
      enHighLevel: 1
    stabilizer:
      estimator: 2 # 1: complementary, 2: kalman
      controller: 2 # 1: PID, 2: mellinger, 6: geometric SE(3) (OOT — requires CONFIG_CONTROLLER_OOT=y)
    # ring:
    #   effect: 16 # 6: double spinner, 7: solid color, 16: packetRate
    #   solidBlue: 255 # if set to solid color
    #   solidGreen: 0 # if set to solid color
    #   solidRed: 0 # if set to solid color
    #   headlightEnable: 0
    deck:
      bcRpm: 1  # RPM deck has no 1-Wire ID — must be force-enabled
    # ════════════════════════════════════════════════════════════════════════════
    # CF2.1 STANDARD MOTORS — locked Jul 2 2026
    # Final: Geom RMSE 2.0 cm (kt=0.05), speed limit kt=0.15 (5.32 s/lap).
    # To reactivate: uncomment this block, comment out the UPGRADED block below.
    # ════════════════════════════════════════════════════════════════════════════
    # indi_gains:
    #   ctrl_mode: 0
    #   kr: 1050.0
    #   kw: 87.0
    #   kr_z: 1050.0
    #   kw_z: 87.0
    #   fc_bw: 70.0
    #   mass: 0.0364          # AUW 36.4 g (CF2.1 + USD + RPM decks)
    #   kt1: 1.4193e-10       # identified 2026-06-30
    #   kt2: 1.4534e-10
    #   kt3: 1.4997e-10
    #   kt4: 1.4655e-10
    # pos_gains:
    #   kp_xy: 40.0
    #   kp_z:  30.0
    #   kv_xy: 8.0
    #   kv_z:  7.0
    # ════════════════════════════════════════════════════════════════════════════
    # CF2.1 UPGRADED MOTORS — tuning in progress
    # Same starting gains as standard (same frame/inertia). Update mass + kt first.
    # Tuning order: mass → kt bench ID → geo hover → fc_bw → KR/KW → INDI → KP/KV → speed sweep
    # To reactivate standard: comment this block, uncomment the STANDARD block above.
    # ════════════════════════════════════════════════════════════════════════════
    indi_gains:
      ctrl_mode: 3            # start geometric; switch to 3 (full INDI) after kt identified
      kr: 750.0               # step up from 603; ωₙ≈27.4 rad/s
      kw: 100.0               # kw=1.83×2×√750≈100; maintains ζ≈1.83 from previous stable point
      kr_z: 750.0
      kw_z: 100.0
      fc_bw: 70.0             # same filter — recheck if attitude noise changes
      mass: 0.0386            # AUW 38.6 g (measured 2026-07-09)
      kt1: 2.2959e-10         # identified 2026-07-09, 6269 stable rows (3 hover flights combined)
      kt2: 2.4668e-10
      kt3: 2.0250e-10
      kt4: 2.5288e-10
    pos_gains:
      kp_xy: 40.0             # same as standard
      kp_z:  30.0             # restored to standard: the over-thrust / 31 cm offset was the
      kv_xy: 8.0              # wrong compiled thrust model, now fixed via
      kv_z:  10.0              # CONFIG_CRAZYFLIE_THRUST_UPGRADE_KIT (mixer matches hardware)
    locSrv:
      extPosStdDev: 1e-3
      extQuatStdDev: 0.5e-1
    # kalman:
    #   resetEstimation: 1
  # reference frame for on-board state-estimate of all drones (use robot_types/type_name to set per type, or
  # robots/drone_name to set per drone)
  reference_frame: "world"
  broadcasts:
    num_repeats: 15 # number of times broadcast commands are repeated
    delay_between_repeats_ms: 1 # delay in milliseconds between individual repeats
