# global settings for all robots
all:
  # firmware logging for all drones (use robot_types/type_name to set per type, or
  # robots/drone_name to set per drone)
  firmware_logging:
    enabled: true
    default_topics:
     # remove to disable default topic
      pose:
        frequency: 10 # Hz
      status:
        frequency: 1 # Hz
    custom_topics:
      # /cf231/state — pos + vel (6 floats = 24 bytes, fits in one CRTP log packet)
      state:
        frequency: 100 # Hz
        vars: ["stateEstimate.x", "stateEstimate.y", "stateEstimate.z",
               "stateEstimate.vx", "stateEstimate.vy", "stateEstimate.vz"]
      # /cf231/attitude — attitude + thrust + battery (5 floats = 20 bytes)
      attitude:
        frequency: 20 # Hz
        vars: ["stabilizer.roll", "stabilizer.pitch", "stabilizer.yaw",
               "stabilizer.thrust", "pm.vbat"]
      # /cf231/gyro_acc — gyro and accelerometer (6 floats = 24 bytes)
      gyro_acc:
        frequency: 20 # Hz
        vars: ["gyro.x", "gyro.y", "gyro.z", "acc.x", "acc.y", "acc.z"]
      # /cf231/indi_state — INDI torques + filtered alpha (6 floats = 24 bytes)
      # tau_{x,y,z}: torque command [Nm] — non-zero only in mode>=2.
      # alp_{x,y,z}: BW-filtered angular acceleration [rad/s²] — logged in ALL modes.
      indi_state:
        frequency: 100 # Hz
        vars: ["indi.tau_x", "indi.tau_y", "indi.tau_z",
               "indi.alp_x", "indi.alp_y", "indi.alp_z"]
      # /cf231/indi_alp_raw — pre-filter angular accel (3 floats = 12 bytes, separate packet)
      indi_alp_raw:
        frequency: 100 # Hz
        vars: ["indi.alp_raw_x", "indi.alp_raw_y", "indi.alp_raw_z"]
      # /cf231/indi_filter_char — FILTER CHARACTERISATION ONLY (swap with indi_state above)
      # fc_bw=70 Hz confirmed 2026-07-11 on UPGRADED drone (same result as standard 2026-07-03).
      # Motor noise at 350-700 Hz, above 50 Hz Nyquist of 100 Hz log — filter works in firmware.
      # indi_filter_char:
      #   frequency: 100 # Hz
      #   vars: ["indi.alp_raw_x", "indi.alp_raw_y", "indi.alp_raw_z",
      #          "indi.alp_x",     "indi.alp_y",     "indi.alp_z"]
      # /cf231/rpm — per-motor RPM (4 uint16 = 8 bytes)
      # ── SWITCH when changing drone ──────────────────────────────────────────
      # EXPERIMENT (2026-07-16): brushless reading OPTICAL RPM DECK (like brushed drones)
      # to test DShot-telemetry-delay hypothesis. ACTIVE:
      rpm:
        frequency: 20 # Hz
        vars: ["rpm.m1", "rpm.m2", "rpm.m3", "rpm.m4"]
      # CF21BL brushless DShot bidirectional ESC telemetry (default — restore to switch back):
      # rpm:
      #   frequency: 20 # Hz
      #   vars: ["motor.m1_rpm", "motor.m2_rpm", "motor.m3_rpm", "motor.m4_rpm"]
  # firmware parameters for all drones (use robot_types/type_name to set per type, or
  # robots/drone_name to set per drone)
  firmware_params:
    commander:
      enHighLevel: 1
    stabilizer:
      estimator: 2 # 1: complementary, 2: kalman
      controller: 2 # 1: PID, 2: mellinger, 6: geometric SE(3) (OOT — requires CONFIG_CONTROLLER_OOT=y)
    # ring:
    #   effect: 16 # 6: double spinner, 7: solid color, 16: packetRate
    #   solidBlue: 255 # if set to solid color
    #   solidGreen: 0 # if set to solid color
    #   solidRed: 0 # if set to solid color
    #   headlightEnable: 0
    deck:
      bcRpm: 1  # RPM deck force-enable. REQUIRED: driver has vid/pid=0x00 (no 1-wire id),
                # so it never auto-detects and rpm.* stays 0 without this. Needed on the
                # brushless too while testing the optical deck. (Comment out to return to DShot.)
    # ════════════════════════════════════════════════════════════════════════════
    # CF2.1 STANDARD MOTORS — locked Jul 2 2026
    # Final: Geom RMSE 2.0 cm (kt=0.05), speed limit kt=0.15 (5.32 s/lap).
    # To reactivate: uncomment this block and deck.bcRpm above, comment out active block below.
    # ════════════════════════════════════════════════════════════════════════════
    # indi_gains:
    #   ctrl_mode: 0
    #   kr: 1050.0
    #   kw: 87.0
    #   kr_z: 1050.0
    #   kw_z: 87.0
    #   fc_bw: 70.0
    #   mass: 0.0364          # AUW 36.4 g (CF2.1 + USD + RPM decks)
    #   kt1: 1.4193e-10       # identified 2026-06-30
    #   kt2: 1.4534e-10
    #   kt3: 1.4997e-10
    #   kt4: 1.4655e-10
    # pos_gains:
    #   kp_xy: 40.0
    #   kp_z:  30.0
    #   kv_xy: 8.0
    #   kv_z:  7.0
    # ════════════════════════════════════════════════════════════════════════════
    # CF2.1 UPGRADED MOTORS — locked Jul 15 2026, 3.7 cm mean RMSE (n=11)
    # To reactivate: uncomment this block and deck.bcRpm above, comment out active block below.
    # ════════════════════════════════════════════════════════════════════════════
    # indi_gains:
    #   ctrl_mode: 3
    #   kr: 603.0
    #   kw: 90.0
    #   kr_z: 603.0
    #   kw_z: 90.0
    #   fc_bw: 70.0
    #   mass: 0.0386            # AUW 38.6 g (measured 2026-07-09)
    #   kt1: 2.2959e-10         # identified 2026-07-09
    #   kt2: 2.4668e-10
    #   kt3: 2.0250e-10
    #   kt4: 2.5288e-10
    # pos_gains:
    #   kp_xy: 40.0
    #   kp_z:  30.0
    #   kv_xy: 8.0
    #   kv_z:  10.0
    # ════════════════════════════════════════════════════════════════════════════
    # CF21BL BRUSHLESS — active, tuning in progress 2026-07-15
    # Inertia: Busetto et al. 2025 (JXX=23.951e-6, ARM_M=35.4mm, TORQUE_RATIO=0.002078)
    # RPM: DShot bidirectional telemetry → log topic "rpm" uses motor.m1_rpm..m4_rpm (NOT rpm.m1..m4).
    # Tuning order: kt ID from hover → fc_bw → KR/KW → figure-8
    # To switch back to upgraded: comment this block, uncomment UPGRADED block + deck.bcRpm above.
    # ════════════════════════════════════════════════════════════════════════════
    indi_gains:
      ctrl_mode: 3              # full INDI — RPM from OPTICAL DECK (rpm.*), not DShot (fixes 7 Hz cycle)
      kr: 603.0                 # stable INDI hover baseline (from upgraded drone)
      kw: 90.0
      kr_z: 603.0
      kw_z: 90.0
      fc_bw: 60.0               # 2026-07-16 hover sweep: flat optimum 50-80, cliff <40. 60 = safe optimum.
      mass: 0.041               # AUW 41.0 g (measured 2026-07-15)
      # kt re-identified 2026-07-16 from OPTICAL DECK geometric hover (18-09-05): RPM balanced
      # to 1.3% (m1-4 ≈ 15.5-15.7k), 0 invalid. Deck & DShot mechanical RPM match to 1.00 →
      # kt unchanged in scale (mean 4.10e-10). Previous DShot-derived kt commented at line end.
      kt1: 4.1623e-10           # was 4.2336e-10 (DShot)
      kt2: 4.0592e-10           # was 3.9865e-10
      kt3: 4.1116e-10           # was 4.0689e-10
      kt4: 4.0631e-10           # was 4.2210e-10
    pos_gains:
      kp_xy: 40.0
      kp_z:  30.0
      kv_xy: 8.0
      kv_z:  10.0
    locSrv:
      extPosStdDev: 1e-3
      extQuatStdDev: 0.5e-1
    # kalman:
    #   resetEstimation: 1
  # reference frame for on-board state-estimate of all drones (use robot_types/type_name to set per type, or
  # robots/drone_name to set per drone)
  reference_frame: "world"
  broadcasts:
    num_repeats: 15 # number of times broadcast commands are repeated
    delay_between_repeats_ms: 1 # delay in milliseconds between individual repeats
